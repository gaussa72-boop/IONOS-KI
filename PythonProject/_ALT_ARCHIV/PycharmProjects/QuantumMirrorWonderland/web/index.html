<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Meta Core - KI Agenten Zentrale</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Heilige Lebensblume - Zentral -->
    <div class="sacred-geometry-container">
        <canvas id="sacred-geometry-canvas" class="sacred-geometry"></canvas>
    </div>

    <!-- Kreisende KI-Agenten -->
    <div class="agents-orbit-container">
        <!-- Agent 1: Singulos -->
        <div class="agent-orbit agent-1" data-agent="singulos">
            <div class="agent-avatar">
                <span class="agent-icon">🌟</span>
                <span class="agent-name">Singulos</span>
            </div>
        </div>

        <!-- Agent 2: IONOS-7 -->
        <div class="agent-orbit agent-2" data-agent="ionos7">
            <div class="agent-avatar">
                <span class="agent-icon">⚡</span>
                <span class="agent-name">IONOS-7</span>
            </div>
        </div>

        <!-- Agent 3: Ultra -->
        <div class="agent-orbit agent-3" data-agent="ultra">
            <div class="agent-avatar">
                <span class="agent-icon">🚀</span>
                <span class="agent-name">Ultra</span>
            </div>
        </div>

        <!-- Agent 4: Nexus -->
        <div class="agent-orbit agent-4" data-agent="nexus">
            <div class="agent-avatar">
                <span class="agent-icon">🧠</span>
                <span class="agent-name">Nexus</span>
            </div>
        </div>

        <!-- Agent 5: Quantum -->
        <div class="agent-orbit agent-5" data-agent="quantum">
            <div class="agent-avatar">
                <span class="agent-icon">⚛️</span>
                <span class="agent-name">Quantum</span>
            </div>
        </div>

        <!-- Agent 6: Spark -->
        <div class="agent-orbit agent-6" data-agent="spark">
            <div class="agent-avatar">
                <span class="agent-icon">✨</span>
                <span class="agent-name">Spark</span>
            </div>
        </div>

        <!-- Agent 7: Nova -->
        <div class="agent-orbit agent-7" data-agent="nova">
            <div class="agent-avatar">
                <span class="agent-icon">💫</span>
                <span class="agent-name">Nova</span>
            </div>
        </div>

        <!-- Agent 8: Zenith -->
        <div class="agent-orbit agent-8" data-agent="zenith">
            <div class="agent-avatar">
                <span class="agent-icon">🔱</span>
                <span class="agent-name">Zenith</span>
            </div>
        </div>

        <!-- Agent 9: Aether -->
        <div class="agent-orbit agent-9" data-agent="aether">
            <div class="agent-avatar">
                <span class="agent-icon">🌌</span>
                <span class="agent-name">Aether</span>
            </div>
        </div>

        <!-- Agent 10: Infinity -->
        <div class="agent-orbit agent-10" data-agent="infinity">
            <div class="agent-avatar">
                <span class="agent-icon">∞</span>
                <span class="agent-name">Infinity</span>
            </div>
        </div>
    </div>

    <!-- Zentraler Punkt - Aktiver Agent Display -->
    <div class="active-agent-display">
        <div class="active-agent-info">
            <div class="active-agent-icon" id="active-agent-icon">⚡</div>
            <div class="active-agent-name" id="active-agent-name">IONOS-7</div>
            <div class="active-agent-status" id="active-agent-status">Online</div>
        </div>
    </div>

    <!-- Chat-Interface (Glaseffekt) -->
    <div id="chat-container" class="chat-interface">
        <div class="chat-header">
            <div class="chat-title">
                <span id="chat-agent-name">IONOS-7</span>
                <span class="chat-status-indicator"></span>
            </div>
            <button id="close-chat" class="close-btn">✕</button>
        </div>

        <div id="chat-messages" class="chat-messages-area"></div>

        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Schreibe eine Nachricht..." autofocus>
            <button id="chat-send" class="send-btn">📤</button>
        </div>
    </div>

    <!-- Info Panel -->
    <div class="info-panel">
        <div class="info-title">Quantum Meta Core</div>
        <div class="info-subtitle">KI-Agenten Zentrale</div>
        <div class="info-agents-count">10 Agenten online</div>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
