<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Singulos - 🌟 Singularität -->
  <defs>
    <radialGradient id="singulos-gradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Hintergrund Kreis -->
  <circle cx="100" cy="100" r="95" fill="url(#singulos-gradient)" stroke="#FFD700" stroke-width="3"/>

  <!-- Zentral-Stern -->
  <text x="100" y="120" font-size="80" text-anchor="middle" fill="#FFFFFF">🌟</text>

  <!-- Glow-Effekt -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.5"/>

  <!-- Name -->
  <text x="100" y="195" font-size="14" text-anchor="middle" fill="#FFD700" font-weight="bold">SINGULOS</text>
</svg>

