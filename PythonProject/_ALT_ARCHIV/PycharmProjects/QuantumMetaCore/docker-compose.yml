version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantum_backend
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - DATABASE_URL=postgresql://quantum_user:securepassword@postgres:5432/quantum_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=QUANTUM_ULTRA_SECRET_2026
      - JWT_SECRET_KEY=JWT_QUANTUM_SECRET_2026
    volumes:
      - ./generated_games:/app/generated_games
    restart: always
    networks:
      - quantum_network

  postgres:
    image: postgres:15-alpine
    container_name: quantum_postgres
    environment:
      - POSTGRES_USER=quantum_user
      - POSTGRES_PASSWORD=securepassword
      - POSTGRES_DB=quantum_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantum_user -d quantum_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - quantum_network

  redis:
    image: redis:7-alpine
    container_name: quantum_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - quantum_network

  nginx:
    image: nginx:alpine
    container_name: quantum_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./cloud/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cloud/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: always
    networks:
      - quantum_network

volumes:
  postgres_data:
  redis_data:

networks:
  quantum_network:
    driver: bridge

