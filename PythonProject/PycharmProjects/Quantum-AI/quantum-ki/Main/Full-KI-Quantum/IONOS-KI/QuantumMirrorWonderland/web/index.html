<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Quantum Mirror Wonderland</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
    <!-- Sacred Geometry Canvas -->
    <div class="sacred-geometry-container">
        <canvas id="sacred-geometry-canvas"></canvas>
    </div>

    <!-- Agents Orbit -->
    <div class="agents-orbit-container" id="agents-orbit">
        <!-- agents will be injected by app.js -->
    </div>

    <!-- Active Agent Display -->
    <div class="active-agent-display" id="active-agent-display">
        <div class="active-agent-info">
            <div class="active-agent-icon" id="active-agent-icon">⚡</div>
            <div class="active-agent-name" id="active-agent-name">IONOS-7</div>
            <div class="active-agent-status" id="active-agent-status">Online</div>
        </div>
    </div>

    <!-- Chat Interface -->
    <div id="chat-container" class="chat-interface">
        <div class="chat-header">
            <div class="chat-title"><span id="chat-agent-name">IONOS-7</span><span class="chat-status-indicator"></span>
            </div>
            <button id="close-chat" class="close-btn">✕</button>
        </div>
        <div id="chat-messages" class="chat-messages-area"></div>
        <div class="chat-input-area">
            <input id="chat-input" type="text" placeholder="Schreibe eine Nachricht...">
            <button id="chat-send" class="send-btn">📤</button>
        </div>
    </div>

    <div class="info-panel">
        <div class="info-title">Quantum Meta Core</div>
        <div class="info-subtitle">KI-Agenten Zentrale</div>
        <div class="info-agents-count">10 Agenten online</div>
    </div>
</div>

<script src="/static/meta_geometry.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
