services:
  - type: web
    name: quantum-mirror
    env: python
    plan: starter
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir . app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///quantum_mirror.db
      - key: REDIS_URL
        value: redis://localhost:6379/0


