<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Quantum AI Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="loading-screen">
        <img src="{{ url_for('static', filename='images/singularity.gif') }}">
        <h1>SINGULARITÄT ENTFACHT...</h1>
    </div>
    <div id="kat-ai-container" class="hidden">
        <div class="chat-header">GOLDENES QUANTEN-INTERFACE ONLINE</div>
        <div id="chat-messages" class="chat-messages">
            <p class="ai-msg"><strong>Omniscient-KI:</strong> Das Quantenfeld ist stabil. Wie kann ich dir helfen?</p>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Befehl eingeben...">
            <button id="send-msg">SENDEN</button>
        </div>
    </div>
    <script>
        setTimeout(() => {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('kat-ai-container').classList.remove('hidden');
        }, 3000); // 3 Sek Ladezeit
    </script>
</body>
</html>
