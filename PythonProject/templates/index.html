<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Spiegelwelt KI</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="main-header"><h1>SPIEGELWELT INTERFACE</h1></div>
    <div class="container">
        <div class="create-box">
            <h2>CREATE YOUR GAME</h2>
            <input type="text" id="userPrompt" placeholder="Deine Vision...">
            <button onclick="startGeneration()">LOS!</button>
        </div>
        <div id="chatWindow" style="border:1px solid gold; height:300px; overflow-y:auto; padding:10px;"></div>
    </div>
    <script>
        async function startGeneration() {
            const input = document.getElementById('userPrompt');
            const response = await fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt: input.value })
            });
            const data = await response.json();
            document.getElementById('chatWi    ').innerHTML += "<div><b>KI:</b> " + data.answer + "</div>";
        }
    </script>
</body>
</html>
