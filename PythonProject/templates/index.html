<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MasterCat Hexagon Portal</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: gold; font-family: 'Courier New', monospace; }

        /* Das rotierende Mandala ganz im Hintergrund */
        .mandala-bg {
            position: fixed; width: 200vw; height: 200vw; top: -50vw; left: -50vw;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Flower-of-Life-600dpi.png/600px-Flower-of-Life-600dpi.png') center/contain no-repeat;
            animation: rotateMandala 120s linear infinite; /* Sehr langsam */
            opacity: 0.1; filter: invert(1) sepia(1) saturate(5) hue-rotate(180deg); z-index: -2;
        }
        @keyframes rotateMandala { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Portal Grid (Auswahl) */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; padding: 50px; }
        .portal { cursor: pointer; text-align: center; transition: 0.4s; }
        .portal img { width: 100%; height: 150px; object-fit: cover; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); border: 1px solid gold; }

        /* DAS SECHSECKIGE CHATFENSTER */
        #chat-wrapper {
            display: none;
            position: fixed; top: 50%; left: 50%;
            width: 600px; height: 600px;
            margin-top: -300px; margin-left: -300px;
            z-index: 10;
        }

        /* Die langsame Rotation des Rahmens */
        .hexagon-frame {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0, 20, 40, 0.8);
            backdrop-filter: blur(15px);
            border: 2px solid gold;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            animation: rotateHex 20s linear infinite; /* Langsame Rotation */
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
        }
        @keyframes rotateHex { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Der Inhalt (Text) darf NICHT mitrotieren, sonst wird einem schwindelig */
        .chat-content {
            position: absolute; top: 15%; left: 15%; width: 70%; height: 70%;
            z-index: 20; display: flex; flex-direction: column;
            color: gold; text-shadow: 0 0 5px black;
        }

        .messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; }
        .input-box { display: flex; border-top: 1px solid gold; padding-top: 10px; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; border-bottom: 1px solid gold; }

        .shatter { position: fixed; top:0; left:0; width:100%; height:100%; background: white; z-index: 1000; display:none; animation: flash 0.4s; }
        @keyframes flash { 0% {opacity:0} 50% {opacity:1} 100% {opacity:0} }
    </style>
</head>
<body>
    <div class="mandala-bg"></div>
    <div class="shatter" id="shatter"></div>

    <div id="portal-view">
        <h1 style="text-align: center;">MASTER-CAT HEXAGON PORTAL</h1>
        <div class="grid">
            <div class="portal" onclick="openKI('QUANTUM', '9.jpg.jpg')"><img src="/static/images/9.jpg.jpg"><p>Quantum</p></div>
            <div class="portal" onclick="openKI('MYSTIC', '4.jpg.jpg')"><img src="/static/images/4.jpg.jpg"><p>Mystic</p></div>
            <div class="portal" onclick="openKI('GOLDEN', '10.jpg.jpg')"><img src="/static/images/10.jpg.jpg"><p>Gold Edition</p></div>
        </div>
    </div>

    <div id="chat-wrapper">
        <div class="hexagon-frame" id="hexFrame"></div>
        <div class="chat-content">
            <h3 id="modeTitle" style="text-align:center;">MasterCat</h3>
            <div class="messages" id="msgs"></div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Sprich...">
                <button onclick="send()" style="background:gold; border:none; cursor:pointer;">OK</button>
            </div>
            <button onclick="location.reload()" style="background:none; color:red; border:none; cursor:pointer; margin-top:10px;">SCHLIESSEN</button>
        </div>
    </div>

    <script>
        function openKI(mode, bg) {
            document.getElementById('shatter').style.display = 'block';
            setTimeout(() => {
                document.getElementById('shatter').style.display = 'none';
                document.getElementById('portal-view').style.display = 'none';
                document.getElementById('chat-wrapper').style.display = 'block';
                document.body.style.backgroundImage = `url('/static/images/${bg}')`;
                document.body.style.backgroundSize = "cover";
                document.getElementById('modeTitle').innerText = mode;
            }, 400);
        }

        function send() {
            const val = document.getElementById('userInput').value;
            const msgs = document.getElementById('msgs');
            msgs.innerHTML += `<div><b>Du:</b> ${val}</div>`;
            document.getElementById('userInput').value = "";

            setTimeout(() => {
                msgs.innerHTML += `<div style="color: cyan;"><b>MasterCat:</b> Ich höre dich durch das Sechseck der Macht...</div>`;
                msgs.scrollTop = msgs.scrollHeight;
            }, 800);
        }
    </script>
</body>
</html>
