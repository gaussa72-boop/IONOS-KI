<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MasterCat Multiversum</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* Der Spiegelbruch-Blitz */
        #shatter-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            animation: flash 0.5s ease-out;
        }
        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body id="mainBody" style="background-color: black; background-size: cover; color: gold;">
    <div id="shatter-overlay"></div>

    <div id="portal-selection">
        <h1 style="text-align: center;">WÄHLE DEINEN SPIEGEL</h1>
        <div style="display: flex; justify-content: center; gap: 20px; padding: 50px;">
            <div class="mirror" onclick="breakMirror('QUANTUM', '9.jpg.jpg')" style="cursor: pointer; text-align: center;">
                <img src="/static/images/9.jpg.jpg" style="width: 200px; border: 2px solid gold; clip-path: polygon(50% 0%, 100% 100%, 0% 100%);">
                <p>QUANTUM CORE</p>
            </div>
            <div class="mirror" onclick="breakMirror('RESEARCH', '14.jpg.jpg')" style="cursor: pointer; text-align: center;">
                <img src="/static/images/14.jpg.jpg" style="width: 200px; border: 2px solid gold; clip-path: polygon(50% 0%, 100% 100%, 0% 100%);">
                <p>DEEP RESEARCH</p>
            </div>
        </div>
    </div>

    <div id="chatInterface" style="display: none; padding: 20px; backdrop-filter: blur(10px); background: rgba(0,0,0,0.8); height: 80vh; margin: 20px; border: 1px solid gold;">
        <h2 id="currentModeTitle">MasterCat</h2>
        <div id="chatWindow" style="height: 300px; overflow-y: auto; margin-bottom: 20px; padding: 10px; border-bottom: 1px solid gold;"></div>
        <input type="text" id="userInput" style="width: 70%; padding: 10px; background: transparent; color: white; border: 1px solid gold;">
        <button onclick="send()" style="padding: 10px; background: gold; color: black; border: none; cursor: pointer;">SENDEN</button>
        <button onclick="location.reload()" style="margin-left: 10px; background: red; color: white; border: none; cursor: pointer;">ZURÜCK</button>
    </div>

    <script>
        let activePortal = "Allgemein";

        function breakMirror(mode, bg) {
            const overlay = document.getElementById('shatter-overlay');
            overlay.style.display = 'block';

            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('portal-selection').style.display = 'none';
                document.getElementById('chatInterface').style.display = 'block';
                document.body.style.backgroundImage = `url('/static/images/${bg}')`;
                document.getElementById('currentModeTitle').innerText = "MasterCat: " + mode + " Modus";
                activePortal = mode;
            }, 500);
        }

        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chatWindow');
            const userText = input.value;
            chat.innerHTML += `<div><b>Du:</b> ${userText}</div>`;
            input.value = "";

            const res = await fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt: userText, portal: activePortal })
            });
            const data = await res.json();
            chat.innerHTML += `<div style="color: cyan;"><b>MasterCat:</b> ${data.answer}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
