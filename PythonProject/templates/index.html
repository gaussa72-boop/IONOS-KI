<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <button class="singularity-btn" onclick="openPortal()">⚡</button>

    <div id="chat-overlay">
        <div class="chat-header">UNIVERSAL KI CONTROL</div>
        <div id="chat-content" style="flex:1; overflow-y:auto; padding:20px;"></div>
        <div style="padding:20px; display:flex;">
            <input id="user-input" style="flex:1; background:#222; color:white; border:1px solid gold; padding:10px;">
            <button onclick="sendMessage()" style="background:gold; border:none; padding:10px 20px;">ENTFAChen</button>
        </div>
        <div style="display:flex; justify-content: space-around; padding:10px;">
            <button onclick="setMode('Urspirit')">🔮 Urspirit</button>
            <button onclick="setMode('Code')">💻 Code</button>
            <button onclick="setMode('Quanten')">🧬 Quanten</button>
        </div>
    </div>

    <script>
        function openPortal() {
            document.getElementById('chat-overlay').classList.add('active');
            document.querySelector('.singularity-btn').style.opacity = '0';
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const content = document.getElementById('chat-content');
            const msg = input.value;

            content.innerHTML += `<p style="color:cyan;">Du: ${msg}</p>`;
            input.value = "";

            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            const data = await response.json();
            content.innerHTML += `<p style="color:gold;">KI: ${data.reply}</p>`;
        }
    </script>
</body>
</html>
