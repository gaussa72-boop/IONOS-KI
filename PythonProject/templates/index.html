<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MasterCat Cosmic Portal</title>
    <style>
        :root {
            --gold: #d4af37;
            --glow: rgba(212, 175, 55, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            /* Hintergrund - Hier suchen wir jetzt nach 9.jpg */
            background-image: url('/static/images/9.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            overflow: hidden;
            transition: background 1s ease;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 0;
        }

        .portal-core {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 700px; height: 700px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Flower-of-Life-600dpi.png/600px-Flower-of-Life-600dpi.png') center/contain no-repeat;
            filter: invert(1) sepia(1) saturate(5) hue-rotate(-10deg) brightness(1.2);
            opacity: 0.5;
            animation: rotatePortal 180s linear infinite;
            z-index: 1;
        }
        @keyframes rotatePortal { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .sun-center {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            background: radial-gradient(circle, #fff 0%, var(--gold) 40%, transparent 70%);
            box-shadow: 0 0 80px 10px white, 0 0 150px 30px var(--gold);
            border-radius: 50%;
            z-index: 2;
        }

        .main-title {
            text-align: center;
            font-size: 2.5em;
            letter-spacing: 12px;
            margin-top: 30px;
            position: relative;
            z-index: 10;
            text-shadow: 0 0 15px var(--gold);
        }

        .portal-labels {
            position: absolute; width: 100%; top: 45%;
            display: flex; justify-content: space-between;
            padding: 0 5%; box-sizing: border-box; z-index: 10;
        }
        .portal-item { cursor: pointer; transition: 0.3s; text-shadow: 0 0 15px #000; font-weight: bold; background: rgba(0,0,0,0.3); padding: 5px; }
        .portal-item:hover { transform: scale(1.1); color: #fff; text-shadow: 0 0 25px var(--gold); }

        .chat-container {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); width: 650px;
            background: rgba(15, 10, 5, 0.95);
            border: 2px solid var(--gold);
            padding: 15px; z-index: 20;
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }
        .interface-header {
            text-align: center; border-bottom: 1px solid var(--gold);
            margin-bottom: 10px; font-size: 1.2em; letter-spacing: 5px;
        }
        .messages { height: 120px; overflow-y: auto; color: #eee; margin-bottom: 10px; text-align: left; }
        .input-area { display: flex; gap: 5px; }
        input { flex: 1; background: var(--gold); border: none; padding: 10px; font-weight: bold; color: #000; outline: none; }
        button { background: #d4af37; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }

        .hex-avatar {
            position: fixed; bottom: 30px; left: 30px;
            width: 180px; height: 180px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            border: 2px solid var(--gold);
            z-index: 30; background: #000;
        }
        .hex-avatar img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="portal-core"></div>
    <div class="sun-center"></div>

    <h1 class="main-title">MasterCat Cosmic Portal</h1>

    <div class="portal-labels">
        <div style="text-align: left;">
            <div class="portal-item" onclick="change('STORY QUEST', '1.jpg')">STORY QUEST PORTAL</div><br><br>
            <div class="portal-item" onclick="change('DEEP RESEARCH', '14.jpg')">DEEP RESEARCH PORTAL</div>
        </div>
        <div style="text-align: right;">
            <div class="portal-item" onclick="change('GOLDEN CORE', '10.jpg')">GOLDEN CORE STATUS</div><br><br>
            <div class="portal-item" onclick="change('SPACE BATTLE', '2.jpg')">SPACE BATTLE PORTAL</div>
        </div>
    </div>

    <div class="hex-avatar">
        <img src="/static/images/10.jpg" id="activeImg">
    </div>

    <div class="chat-container">
        <div class="interface-header">SPIEGELWELT INTERFACE</div>
        <div class="messages" id="box">
            <div><b>MasterCat:</b> Initialisiere... Wähle ein Portal.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Befehl...">
            <button onclick="sendMsg()">SENDEN</button>
            <button style="background:#b00; color:white;" onclick="location.reload()">RESET</button>
        </div>
    </div>

    <script>
        function sendMsg() {
            const i = document.getElementById('userInput');
            const b = document.getElementById('box');
            if(!i.value) return;
            b.innerHTML += `<div><b>Du:</b> ${i.value}</div>`;
            i.value = "";
            b.scrollTop = b.scrollHeight;
        }

        function change(name, img) {
            // JavaScript sucht nun nach .jpg
            document.getElementById('activeImg').src = "/static/images/" + img;
            document.body.style.backgroundImage = `url('/static/images/${img}')`;
            document.getElementById('box').innerHTML += `<div style="color:var(--gold)">Portal ${name} wird geladen...</div>`;
        }
    </script>
</body>
</html>
