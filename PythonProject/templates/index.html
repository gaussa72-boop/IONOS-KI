<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MasterCat Hexagon Portal</title>
<style>
    /* ... deine bisherigen Styles (Mandala-BG, Grid) ... */

    /* DAS GALAKTISCHE LICHT-PORTAL */
    #chat-container {
        display: none; position: fixed; top: 50%; left: 50%;
        width: 600px; height: 600px; margin-top: -300px; margin-left: -300px; z-index: 10;
        display: flex; align-items: center; justify-content: center;
    }

    /* Die Lebensblume aus Licht */
    .flower-of-light {
        position: absolute; width: 100%; height: 100%;
        background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Flower-of-Life-600dpi.png/600px-Flower-of-Life-600dpi.png');
        background-size: contain; background-repeat: no-repeat; background-position: center;
        filter: invert(1) sepia(1) saturate(5) hue-rotate(180deg); /* Blaues Leuchten */
        opacity: 0.6; animation: rotateFlower 200s linear infinite;
    }
    @keyframes rotateFlower { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Der Sternen-Kern (Pulsierend) */
    .star-core {
        position: absolute; width: 150px; height: 150px;
        background: radial-gradient(circle, #fff 0%, #gold 40%, transparent 70%);
        clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); /* Sternform */
        animation: pulseCore 4s ease-in-out infinite;
        box-shadow: 0 0 50px gold;
    }
    @keyframes pulseCore { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

    /* Galaktischer Nebel Effekt */
    .galactic-nebula {
        position: absolute; width: 100%; height: 100%;
        background: radial-gradient(circle at center, rgba(100,0,255,0.2) 0%, rgba(0,0,0,0) 70%),
                    radial-gradient(circle at 30% 30%, rgba(255,100,0,0.1) 0%, rgba(0,0,0,0) 50%);
        filter: blur(30px); animation: nebulaShift 20s linear infinite;
    }
    @keyframes nebulaShift { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

    /* Der Chat-Text (Über allen Ebenen) */
    .chat-content {
        position: relative; z-index: 20; color: gold; text-align: center; font-size: 13px;
    }
    /* ... Rest des Chat-Contents (Messages, Input) ... */
</style>

<div id="chat-container">
    <div class="galactic-nebula"></div>
    <div class="flower-of-light"></div>
    <div class="star-core"></div>
    <div class="chat-content">
        </div>
</div>

    <script>
        function openKI(mode, bg) {
            document.getElementById('shatter').style.display = 'block';
            setTimeout(() => {
                document.getElementById('shatter').style.display = 'none';
                document.getElementById('portal-view').style.display = 'none';
                document.getElementById('chat-wrapper').style.display = 'block';
                document.body.style.backgroundImage = `url('/static/images/${bg}')`;
                document.body.style.backgroundSize = "cover";
                document.getElementById('modeTitle').innerText = mode;
            }, 400);
        }

        function send() {
            const val = document.getElementById('userInput').value;
            const msgs = document.getElementById('msgs');
            msgs.innerHTML += `<div><b>Du:</b> ${val}</div>`;
            document.getElementById('userInput').value = "";

            setTimeout(() => {
                msgs.innerHTML += `<div style="color: cyan;"><b>MasterCat:</b> Ich höre dich durch das Sechseck der Macht...</div>`;
                msgs.scrollTop = msgs.scrollHeight;
            }, 800);
        }
    </script>
</body>
</html>
