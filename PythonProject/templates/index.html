<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MasterCat Interface</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="portals">
            <div class="portal" onclick="selectPortal('RPG')">
                <img src="/static/images/1.jpg.jpg" width="100">
                <p>RPG QUEST</p>
            </div>
            <div class="portal" onclick="selectPortal('SPACE')">
                <img src="/static/images/4.jpg.jpg" width="100">
                <p>SPACE BATTLE</p>
            </div>
        </div>
        
        <div class="chat-area">
            <div id="chatWindow"></div>
            <input type="text" id="userPrompt" placeholder="Befehl an MasterCat...">
            <button onclick="startGeneration()">LOS!</button>
        </div>
    </div>
</body>
</html>
