<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MasterCat Cosmic Portal</title>
    <style>
        :root {
            --gold: #d4af37;
            --glow: rgba(212, 175, 55, 0.5);
            --bg-dark: rgba(10, 10, 20, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #000 80%);
        }

        /* Galaktischer Hintergrund mit Nebel */
        .nebula {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            z-index: -1;
        }

        /* Das zentrale Portal (Lebensblume & Licht) */
        .portal-core {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Flower-of-Life-600dpi.png/600px-Flower-of-Life-600dpi.png') center/contain no-repeat;
            filter: invert(1) sepia(1) saturate(3) hue-rotate(0deg) brightness(1.2);
            opacity: 0.4;
            animation: rotatePortal 120s linear infinite;
        }

        @keyframes rotatePortal { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .sun-center {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #fff 0%, var(--gold) 50%, transparent 70%);
            filter: blur(10px);
            z-index: 1;
            box-shadow: 0 0 100px var(--gold);
        }

        /* Titel */
        .main-title {
            text-align: center;
            font-size: 3em;
            letter-spacing: 8px;
            margin-top: 40px;
            text-shadow: 0 0 20px var(--gold);
        }

        /* Spiegelwelt Interface Text (über dem Chat) */
        .interface-label {
            position: absolute;
            bottom: 300px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5em;
            letter-spacing: 4px;
            border-top: 1px solid var(--gold);
            border-bottom: 1px solid var(--gold);
            padding: 5px 20px;
            background: rgba(0,0,0,0.5);
        }

        /* Die Portale (Links und Rechts) */
        .portal-labels {
            position: absolute;
            width: 100%;
            top: 45%;
            display: flex;
            justify-content: space-between;
            padding: 0 10%;
            box-sizing: border-box;
            font-size: 0.9em;
            z-index: 10;
        }

        .portal-item {
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            width: 150px;
        }
        .portal-item:hover { text-shadow: 0 0 15px #fff; transform: scale(1.1); }

        /* Das goldene Chatfenster unten */
        .chat-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            background: rgba(212, 175, 55, 0.15);
            border: 2px solid var(--gold);
            border-radius: 5px;
            backdrop-filter: blur(10px);
            padding: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .messages {
            height: 140px;
            overflow-y: auto;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #fff;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: linear-gradient(to bottom, #d4af37, #b8860b);
            border: 1px solid #000;
            padding: 8px;
            color: #000;
            font-weight: bold;
        }

        button {
            background: #a00;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
        }

        button.send { background: #d4af37; color: #000; }

        /* Hexagon Avatar (Unten Links wie im Bild) */
        .hex-nav {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 180px;
            height: 180px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            border: 2px solid var(--gold);
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hex-nav img {
            width: 90%;
            height: 90%;
            clip-path: inherit;
            animation: slowRotate 20s linear infinite;
        }
        @keyframes slowRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    </style>
</head>
<body>
    <div class="nebula"></div>
    <div class="portal-core"></div>
    <div class="sun-center"></div>

    <h1 class="main-title">MasterCat Cosmic Portal</h1>

    <div class="portal-labels">
        <div class="portal-side">
            <div class="portal-item" onclick="changeMode('STORY')">STORY QUEST PORTAL</div>
            <br><br><br>
            <div class="portal-item" onclick="changeMode('RESEARCH')">DEEP RESEARCH PORTAL</div>
        </div>
        <div class="portal-side">
            <div class="portal-item" onclick="changeMode('STATUS')">GOLDEN CORE STATUS</div>
            <br><br><br>
            <div class="portal-item" onclick="changeMode('BATTLE')">SPACE BATTLE PORTAL</div>
        </div>
    </div>

    <div class="hex-nav">
        <img src="/static/images/10.jpg.jpg" id="avatarImg">
    </div>

    <div class="interface-label">SPIEGELWELT INTERFACE</div>

    <div class="chat-container">
        <div class="messages" id="chatbox">
            <div><b style="color: var(--gold);">MasterCat:</b> Ich bin MasterCat, dein Führer durch das Multiversum. Was möchtest du erschaffen?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="...">
            <button class="send" onclick="send()">SENDEN</button>
            <button onclick="location.reload()">ZURÜCK</button>
        </div>
    </div>

    <script>
        function send() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chatbox');
            if(!input.value) return;
            box.innerHTML += `<div><b>Du:</b> ${input.value}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;
        }

        function changeMode(mode) {
            document.getElementById('chatbox').innerHTML += `<div style="color: cyan;">System: Wechsel zu ${mode}...</div>`;
            // Hier wechselt das Avatar Bild passend zum Mode
            const img = document.getElementById('avatarImg');
            if(mode === 'STORY') img.src = "/static/images/1.jpg.jpg";
            if(mode === 'RESEARCH') img.src = "/static/images/14.jpg.jpg";
            if(mode === 'BATTLE') img.src = "/static/images/9.jpg.jpg";
        }
    </script>
</body>
</html>
