<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Spiegelwelt Interface</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<!-- 🌌 START -->
<div id="startscreen">
    <div class="singularity"></div>
    <h1>SPIEGELWELT INTERFACE</h1>
</div>

<!-- 🌠 PORTALE -->
<div id="portal-screen" class="hidden">

    <div class="portal" onclick="enterWorld('RPG Welt')">
        <img src="/static/images/rpg.jpg">
    </div>

    <div class="portal main" onclick="enterWorld('Eigene Welt')">
        <input id="idea" placeholder="Deine Idee...">
        <button>LOS!</button>
    </div>

    <div class="portal" onclick="enterWorld('Space Welt')">
        <img src="/static/images/space.jpg">
    </div>

</div>

<!-- 💥 EXPLOSION -->
<div id="explosion" class="hidden">
    <div class="singularity big"></div>
</div>

<!-- 🪞 CHAT -->
<div id="chat-container" class="hidden">

    <div class="chat-frame">
        <div id="chat-box"></div>

        <div class="input-area">
            <input id="input" placeholder="Nachricht schreiben...">
            <button onclick="send()">Senden</button>
        </div>
    </div>

</div>

<script src="/static/js/app.js"></script>
</body>
</html>
<img src="/static/images/singularity_core.png" alt="Zentrum der Singularität">

<img src="/static/images/galaxy_rupture_total.png" alt="Galaktischer Ausbruch">
